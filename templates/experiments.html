{% extends "base.html" %}

{% block content %}

<h1>
Experiments
</h1>

<table class="table table-striped">

<tr>

<th>Model</th>
<th>Seq Length</th>
<th>MAE</th>
<th>RMSE</th>
<th>R²</th>

</tr>

{% for row in experiments %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
